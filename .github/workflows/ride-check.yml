name: Ride check

on:
  schedule:
    # One fixed UTC cron per slot, firing *every* day. We target 9 pm / 6 am ET
    # but don't care that DST shifts the local time by an hour (9->8 pm, 6->5 am
    # in winter), so no per-offset gating is needed. Which days actually run is
    # decided in code against office_days in the private config.yaml (kept out of
    # this committed file), so the agent no-ops on non-office days. The 15-minute
    # offset dodges the top-of-hour load spike on GitHub's scheduler.
    - cron: "15 1 * * *" # 9:15 pm EDT / 8:15 pm EST -> night_before (targets tomorrow)
    - cron: "15 10 * * *" # 6:15 am EDT / 5:15 am EST -> morning (targets today)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        options: [night_before, morning]
        default: night_before
        required: true
      dry_run:
        description: "Dry run (print email instead of sending)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ride-check
  cancel-in-progress: false

jobs:
  ride-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Write config.yaml from secret
        env:
          RIDE_CONFIG_YAML: ${{ secrets.RIDE_CONFIG_YAML }}
        run: printf '%s' "$RIDE_CONFIG_YAML" > config.yaml

      - name: Run ride-check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_NAME: ${{ vars.OPENAI_MODEL_NAME }}
          OPENWEATHERAPP_API_KEY: ${{ secrets.OPENWEATHERAPP_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Optional: LangSmith tracing. Tracing turns on only when the secret is
          # set, so it's a safe no-op until you add LANGSMITH_API_KEY to the repo.
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: ${{ vars.LANGSMITH_PROJECT }}
        run: |
          # Manual runs pass the mode as an input; scheduled runs resolve it from
          # the cron expression that fired (github.event.schedule echoes the exact
          # string from the schedule list above).
          # Manual runs pass the mode as an input (and --force past the office-day
          # filter so a test run always executes); scheduled runs resolve the mode
          # from the cron expression that fired and respect office_days.
          FORCE_FLAG=""
          if [ -n "${{ inputs.mode }}" ]; then
            MODE="${{ inputs.mode }}"
            FORCE_FLAG="--force"
          elif [ "${{ github.event.schedule }}" = "15 1 * * *" ]; then
            MODE="night_before"
          elif [ "${{ github.event.schedule }}" = "15 10 * * *" ]; then
            MODE="morning"
          else
            echo "Could not resolve run mode from trigger '${{ github.event.schedule }}'" >&2
            exit 1
          fi
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m ride_agent --mode "$MODE" $FORCE_FLAG $DRY_RUN_FLAG

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f state/last_run.json ]; then
            echo "No state file written this run (dry-run or send failure); nothing to commit"
            exit 0
          fi
          git add state/last_run.json
          if ! git diff --cached --quiet; then
            git commit -m "state: update last_run.json [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi
